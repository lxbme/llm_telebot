services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-telebot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data:Z
      - ./mcp_config.json:/app/mcp_config.json:ro,Z
    environment:
      # Persist editable YAML config in the data volume
      - CONFIG_FILE=/app/data/config.yaml
      # Override DB paths to use the container volume mount
      - CHAT_DB_PATH=/app/data/chat.db
      - PROFILE_DB_PATH=/app/data/profiles.db
      - USER_MCP_DB_PATH=/app/data/user_mcp.db
      - MCP_CONFIG_PATH=/app/mcp_config.json
