services:
  bot:
    image: ghcr.io/lxbme/llm_telebot:latest
    container_name: llm-telebot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./mcp_config.json:/app/mcp_config.json:ro
    environment:
      CONFIG_FILE: /app/data/config.yaml
      CHAT_DB_PATH: /app/data/chat.db
      PROFILE_DB_PATH: /app/data/profiles.db
      USER_MCP_DB_PATH: /app/data/user_mcp.db
      MCP_CONFIG_PATH: /app/mcp_config.json